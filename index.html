<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <!-- Favicon -->
    <link rel="icon" href="./assets/img/pokeball.png" type="image/x-icon">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS --> 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/colors.css">
    <link rel="stylesheet" href="./styles/components.css">
    <link rel="stylesheet" href="./styles/loading_spinner.css">
    <link rel="stylesheet" href="./styles/modal_pokemon.css">
    <link rel="stylesheet" href="./styles/header.css">
    <link rel="stylesheet" href="./styles/footer.css">

    <!-- JS -->
    <script src="./script.js" defer></script>
</head>

<body onload="init()">
    <!-- Header -->
    <header>
        <div class="header__container">
            <div class="header__logo">
                <img src="./assets/img/pokeball.png" alt="Pokéball">
                <span>Pokédex</span><br>
            </div>
            <div class="header__counter">
                <p id="header__counter--loaded">0</p>
                <p>/</p>
                <p id="header__counter--total">0</p>
            </div>
            <div class="header__search">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search for a Pokémon"> 
            </div>
        </div>
    </header>

    <!-- Main -->
    <main>
        <div id="main__container">
            <div class="card" onclick="showModal()">
                <span class="card__title">#6 Charizard</span>
                <img class="card__image bg-fire" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/6.svg" alt="charizard">
                <div class="card__types">
                    <div class="card__types--type bg-fire">
                        <img class="card__types--icon" src="./assets/icons/fire.svg">
                    </div>
                    <div class="card__types--type bg-flying">
                        <img class="card__types--icon" src="./assets/icons/flying.svg">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <img src="./assets/logo/lee-roy.png" alt="Logo Lee-Roy">
        <p>&copy; Design by Lee-Roy Romann</p>
    </footer>

    <!-- Overlay Loading Spinner -->
    <div id="overlay__spinner" class="d_none">
        <svg class="svg-spinner" viewBox="0 0 50 50">
            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
        </svg>
    </div>

    <!-- Modal-Overlay Pokemon -->
    <div class="modal__overlay d_none" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal__header">
                <span class="modal__id">#6 - Glurak</span>
                <i class="bi bi-x modal__close" onclick="closeModal()"></i>
            </div>
            <div class="modal__image">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/dream-world/6.svg" alt="">
            </div>
            <div class="modal__types">
                <div class="card__types--type bg-fire">
                    <img class="card__types--icon" src="./assets/icons/fire.svg">
                </div>
                <div class="card__types--type bg-flying">
                    <img class="card__types--icon" src="./assets/icons/flying.svg">
                </div>
            </div>
            <div>
                <div class="modal__selectors">
                    <div class="modal__selector active">infos</div>
                    <div class="modal__selector">stats</div>
                    <div class="modal__selector">evo chain</div>
                </div>
                <div class="modal__infos">
                    <div class="modal__info-spec">
                        <p>Height:</p>
                        <p>Weight:</p>
                        <p>Base Exp.:</p>
                        <p>Abilities:</p>
                    </div>
                    <div class="modal__info-value">
                        <p>1.7m</p>
                        <p>90.5kg</p>
                        <p>1.7m</p>
                        <p>90.5kg</p>
                    </div>
                </div>
            </div>
            <div class="modal__footer">
                <img onclick="skipToNextPokemon('left')" src="./assets/img/arrow_left.png" alt="Nach links" title="Skip-Button Links">
                <p>6 / 12</p>
                <img onclick="skipToNextPokemon('right')" src="./assets/img/arrow_right.png" alt="Nach rechts" title="Skip-Button Rechts">
            </div>
        </div>
    </div>

</body>
</html>
